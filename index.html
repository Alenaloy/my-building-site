<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintez Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Стильная аккуратная шапка слева сверху */
        #header-logo {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.7);
            z-index: 10;
            text-transform: lowercase;
        }
        /* Тонкая подсказка внизу экрана */
        #hint-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            color: #00ffcc;
            pointer-events: none;
            z-index: 10;
        }
        /* Окно детального осмотра на полный экран */
        #detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            display: none;
            z-index: 200;
        }
        #modal-canvas {
            width: 100%;
            height: 100%;
        }
        #close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: 1px solid rgba(255, 51, 51, 0.5);
            color: #ff3333;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        #close-btn:hover {
            background: #ff3333;
            color: #fff;
            border-color: #ff3333;
        }
        #modal-title {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #00ffcc;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="header-logo">sintez.space</div>
    <div id="hint-bar">Зажми ЛКМ для вращения • Нажми на объект внутри для детекции</div>
    <div id="canvas-container"></div>

    <div id="detail-modal">
        <div id="modal-title">Скан-данные: Детальный осмотр компонента</div>
        <button id="close-btn" onclick="closeModal()">ЗАКРЫТЬ</button>
        <div id="modal-canvas"></div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let mainModel;
        let clickableObjects = []; // Сюда попадают все внутренние меши (кулеры и т.д.)
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Переменные для модального окна
        let modalScene, modalCamera, modalRenderer, modalControls, clonedObject;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 15, 30); // Ракурс чуть сверху и сбоку для объема

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Идеальное свободное вращение без ограничений углов
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.minDistance = 8;
            controls.maxDistance = 60;

            // Мягкий заполняющий свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // Направленные источники для бликов на внутренних моделях
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 40, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x00ffcc, 0.3); // Легкий бирюзовый оттенок сзади
            dirLight2.position.set(-20, 10, -20);
            scene.add(dirLight2);

            const loader = new THREE.GLTFLoader();
            
            loader.load('korpus.glb.glb', function (gltf) {
                mainModel = gltf.scene;
                
                mainModel.traverse(function (child) {
                    if (child.isMesh) {
                        // Если это объект здания — делаем его ПОСТОЯННОЙ эстетичной сеткой
                        if (child.name.includes('korpus_mesh')) {
                            child.material = new THREE.MeshBasicMaterial({
                                color: 0x444444,       // Цвет линий сетки
                                wireframe: true,       // ВКЛЮЧАЕМ СЕТКУ НАВСЕГДА
                                transparent: true,
                                opacity: 0.4           // Делаем её слегка прозрачной, призрачной
                            });
                        } else {
                            // Все остальные объекты (кулер и т.д.) внутри здания оставляем плотными
                            child.material = new THREE.MeshStandardMaterial({
                                color: 0xaaaaaa,
                                roughness: 0.3,
                                metalness: 0.7
                            });
                            // Добавляем в массив для кликов
                            clickableObjects.push(child);
                        }
                    }
                });

                // Центрируем модель
                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                
                scene.add(mainModel);
                controls.target.set(0, 0, 0);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update(); 
            if (renderer && scene && camera) renderer.render(scene, camera);
            
            if (modalControls) modalControls.update();
            if (modalRenderer && modalScene && modalCamera) modalRenderer.render(modalScene, modalCamera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Следим за курсором мыши
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            // Если навели на внутренний плотный объект — меняем курсор на палец
            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
        }

        // Клик по внутреннему объекту
        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                // Открываем кликнутый меш на полный экран
                openModal(intersects[0].object);
            }
        }

        // ОТКРЫТИЕ НА ПОЛНЫЙ ЭКРАН
        function openModal(targetMesh) {
            document.getElementById('detail-modal').style.display = 'block';
            const modalContainer = document.getElementById('modal-canvas');

            modalScene = new THREE.Scene();
            modalScene.background = new THREE.Color(0x020202);

            modalCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            modalCamera.position.set(0, 0, 4);

            modalRenderer = new THREE.WebGLRenderer({ antialias: true });
            modalRenderer.setSize(window.innerWidth, window.innerHeight);
            modalRenderer.outputEncoding = THREE.sRGBEncoding;
            modalContainer.appendChild(modalRenderer.domElement);

            modalControls = new THREE.OrbitControls(modalCamera, modalRenderer.domElement);
            modalControls.enableDamping = true;

            // Хороший свет для детального осмотра детали
            const light = new THREE.AmbientLight(0xffffff, 0.6);
            modalScene.add(light);
            
            const dirLight = new THREE.DirectionalLight(0x00ffcc, 1);
            dirLight.position.set(5, 5, 5);
            modalScene.add(dirLight);

            // Создаем чистый клон объекта без привязки к основной сцене
            clonedObject = targetMesh.clone();
            clonedObject.position.set(0, 0, 0);
            
            // Авто-масштабирование клона под экран, чтобы он не был слишком маленьким/большим
            const box = new THREE.Box3().setFromObject(clonedObject);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 1.5 / maxDim;
            clonedObject.scale.set(scaleFactor, scaleFactor, scaleFactor);

            modalScene.add(clonedObject);
        }

        // ЗАКРЫТИЕ ОКНА
        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            const modalContainer = document.getElementById('modal-canvas');
            
            while(modalContainer.firstChild) {
                modalContainer.removeChild(modalContainer.firstChild);
            }
            modalScene = null;
            modalCamera = null;
            modalRenderer = null;
            modalControls = null;
        }
    </script>
</body>
</html>
