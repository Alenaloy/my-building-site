<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Корпус</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 30px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 100;
            text-align: center;
            border: 1px solid #00ffcc;
            max-width: 80%;
            word-wrap: break-word;
        }
        .label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -120%);
            z-index: 10;
            border: 1px solid #00ffcc;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="status-overlay">Инициализация 3D сцены...</div>
    <div id="canvas-container"></div>
    <div id="info-label" class="label">Этаж</div>

    <script>
        let scene, camera, renderer, controls;
        let model;
        let clickableObjects = []; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateStatus(msg, isError = false) {
            const status = document.getElementById('status-overlay');
            if (!status) return;
            status.style.color = isError ? '#ff3333' : '#00ffcc';
            status.style.borderColor = isError ? '#ff3333' : '#00ffcc';
            status.innerText = msg;
        }

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 30); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(15, 30, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-15, 15, -20);
            scene.add(dirLight2);

            const loader = new THREE.GLTFLoader();
            
            // Подключаем точное имя файла с двойным расширением
            updateStatus("Начало загрузки файла 'korpus.glb.glb'...");

            loader.load(
                'korpus.glb.glb', 
                function (gltf) {
                    document.getElementById('status-overlay').style.display = 'none';
                    
                    model = gltf.scene;
                    
                    const defaultMaterial = new THREE.MeshStandardMaterial({
                        color: 0x999999,
                        roughness: 0.6,
                        metalness: 0.1,
                        side: THREE.DoubleSide
                    });

                    model.traverse(function (child) {
                        if (child.isMesh) {
                            child.material = defaultMaterial;
                        }
                    });
                    
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    
                    model.position.x += (model.position.x - center.x);
                    model.position.y += (model.position.y - center.y);
                    model.position.z += (model.position.z - center.z);
                    
                    scene.add(model);

                    // Метки для этажей (высоту можно скорректировать под окна)
                    createFloorMarker(new THREE.Vector3(0, -3.0, 3), "1 Этаж", "https://example.com/floor1");
                    createFloorMarker(new THREE.Vector3(0, -0.8, 3), "2 Этаж", "https://example.com/floor2");
                    createFloorMarker(new THREE.Vector3(0, 1.4, 3), "3 Этаж", "https://example.com/floor3");
                    createFloorMarker(new THREE.Vector3(0, 3.5, 3), "4 Этаж", "https://example.com/floor4");
                },
                function (xhr) {
                    if (xhr.total > 0) {
                        const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                        updateStatus("Загрузка модели: " + percentComplete + "%");
                    } else {
                        updateStatus("Скачивание модели... " + (xhr.loaded / (1024 * 1024)).toFixed(2) + " MB");
                    }
                },
                function (error) {
                    updateStatus("ОШИБКА: Не удалось прочитать 'korpus.glb.glb'.\nТехнический текст: " + error.message, true);
                    console.error(error);
                }
            );

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function createFloorMarker(position, name, url) {
            const geometry = new THREE.SphereGeometry(0.35, 16, 16); 
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.9 });
            const marker = new THREE.Mesh(geometry, material);
            
            marker.position.copy(position);
            marker.userData = { name: name, url: url }; 
            
            scene.add(marker);
            clickableObjects.push(marker); 
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (model) {
                const intersectsModel = raycaster.intersectObject(model, true);
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material.wireframe = intersectsModel.length > 0;
                    }
                });
            }

            const intersectsMarkers = raycaster.intersectObjects(clickableObjects);
            const label = document.getElementById('info-label');

            if (intersectsMarkers.length > 0) {
                const hitMarker = intersectsMarkers[0].object;
                document.body.style.cursor = 'pointer';
                
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = hitMarker.userData.name;
            } else {
                if (model && raycaster.intersectObject(model, true).length > 0) {
                    document.body.style.cursor = 'pointer';
                } else {
                    document.body.style.cursor = 'default';
                }
                label.style.display = 'none';
            }
        }

        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const clickedMarker = intersects[0].object;
                window.location.href = clickedMarker.userData.url;
            }
        }
    </script>
</body>
</html>
