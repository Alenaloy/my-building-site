<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Корпус</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -120%);
            z-index: 10;
            border: 1px solid #00ffcc;
        }
        /* Окно для вывода ошибок прямо на экран */
        #error-log {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ff3333;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-family: monospace;
            z-index: 100;
            display: none;
            border-radius: 5px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="error-log"></div>
    <div id="canvas-container"></div>
    <div id="info-label" class="label">Этаж</div>

    <script>
        let scene, camera, renderer, controls;
        let model;
        let clickableObjects = []; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function showStatus(msg, isError = true) {
            const log = document.getElementById('error-log');
            log.style.display = 'block';
            log.style.color = isError ? '#ff3333' : '#00ffcc';
            log.innerText = msg;
        }

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Настраиваем камеру под длинный корпус — смотрим чуть дальше и выше
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 35); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Хорошее круговое освещение для проявления текстуры здания
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 40, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-20, 20, -20);
            scene.add(dirLight2);

            const loader = new THREE.GLTFLoader();
            
            showStatus("Загрузка модели...", false);

            loader.load('model.glb', function (gltf) {
                // Если загрузилось, убираем сообщение
                document.getElementById('error-log').style.display = 'none';
                
                model = gltf.scene;
                
                // Простой матовый материал, чтобы модель точно было видно
                const defaultMaterial = new THREE.MeshStandardMaterial({
                    color: 0xbbbbbb,
                    roughness: 0.6,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = defaultMaterial;
                    }
                });
                
                // Центрирование и подгонка масштаба под экран
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                scene.add(model);

                // Расставляем маркеры по твоим 4 этажам (высоту Y можно будет скорректировать)
                createFloorMarker(new THREE.Vector3(0, -3.0, 3), "1 Этаж", "https://example.com/floor1");
                createFloorMarker(new THREE.Vector3(0, -1.0, 3), "2 Этаж", "https://example.com/floor2");
                createFloorMarker(new THREE.Vector3(0, 1.0, 3), "3 Этаж", "https://example.com/floor3");
                createFloorMarker(new THREE.Vector3(0, 3.0, 3), "4 Этаж", "https://example.com/floor4");

            }, undefined, function (error) {
                showStatus("Ошибка: Не удалось найти или прочитать файл 'model.glb'. Проверь имя файла на GitHub.");
                console.error(error);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function createFloorMarker(position, name, url) {
            const geometry = new THREE.SphereGeometry(0.4, 16, 16); 
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            const marker = new THREE.Mesh(geometry, material);
            
            marker.position.copy(position);
            marker.userData = { name: name, url: url }; 
            
            scene.add(marker);
            clickableObjects.push(marker); 
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (model) {
                const intersectsModel = raycaster.intersectObject(model, true);
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material.wireframe = intersectsModel.length > 0;
                    }
                });
            }

            const intersectsMarkers = raycaster.intersectObjects(clickableObjects);
            const label = document.getElementById('info-label');

            if (intersectsMarkers.length > 0) {
                const hitMarker = intersectsMarkers[0].object;
                document.body.style.cursor = 'pointer';
                
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = hitMarker.userData.name;
            } else {
                if (model && raycaster.intersectObject(model, true).length > 0) {
                    document.body.style.cursor = 'pointer';
                } else {
                    document.body.style.cursor = 'default';
                }
                label.style.display = 'none';
            }
        }

        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const clickedMarker = intersects[0].object;
                window.location.href = clickedMarker.userData.url;
            }
        }
    </script>
</body>
</html>
