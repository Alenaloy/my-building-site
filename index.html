<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>sintez.space</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        #header { position: absolute; top: 30px; left: 40px; color: #fff; letter-spacing: 0.2em; text-transform: uppercase; font-size: 14px; z-index: 10; pointer-events: none; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
</head>
<body>
    <div id="header">sintez.space</div>
    <div id="canvas-container"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        let korpus = null;
        let internalObjects = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    if(obj.name.toLowerCase().includes('korpus')) {
                        korpus = obj;
                        // Настраиваем материал для эффекта сетки
                        obj.material = new THREE.MeshStandardMaterial({
                            color: 0xffffff, 
                            transparent: true,
                            opacity: 1.0
                        });
                    } else {
                        internalObjects.push(obj);
                        obj.visible = false;
                    }
                }
            });
            const box = new THREE.Box3().setFromObject(gltf.scene);
            gltf.scene.position.sub(box.getCenter(new THREE.Vector3()));
            scene.add(gltf.scene);
            camera.position.set(0, 0, 50);
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            
            if(korpus) {
                const intersects = raycaster.intersectObject(korpus);
                const isHovered = intersects.length > 0;
                
                // Эффект: при наведении включаем сетку (wireframe)
                korpus.material.wireframe = isHovered;
                korpus.material.opacity = isHovered ? 0.3 : 1.0;
                
                // Показываем/скрываем внутренности
                internalObjects.forEach(obj => obj.visible = isHovered);
            }
        });

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();
    </script>
</body>
</html>
