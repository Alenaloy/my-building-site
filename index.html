<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sintez.Space</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #loader { position: fixed; inset: 0; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 1.5s; }
        .letter { color: #fff; font-size: 32px; letter-spacing: 0.2em; text-transform: uppercase; display: inline-block; transition: transform 0.2s ease-out; }
        
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader"></div>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        // Прелоудер с интерактивом
        const loaderDiv = document.getElementById('loader');
        "SINTEZ.SPACE".split('').forEach(char => {
            const span = document.createElement('span');
            span.textContent = char;
            span.className = 'letter';
            loaderDiv.appendChild(span);
        });

        window.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.letter').forEach((letter) => {
                const rect = letter.getBoundingClientRect();
                const dx = e.clientX - (rect.left + rect.width / 2);
                const dy = e.clientY - (rect.top + rect.height / 2);
                letter.style.transform = `translate(${dx/8}px, ${dy/8}px)`;
            });
        });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Добавляем свет, чтобы цветные модели были видны
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    // ЕСЛИ ЭТО КОРПУС - делаем его красивой серой сеткой
                    if(obj.name.toLowerCase().includes('korpus')) {
                        obj.material = new THREE.MeshBasicMaterial({
                            color: 0x888888, // Стильный серебристо-серый
                            wireframe: true, 
                            transparent: true, 
                            opacity: 0.3
                        });
                    } 
                    // ЕСЛИ ЭТО ВНУТРЕННОСТИ - оставляем их родные материалы (цвета)
                    // Ничего не делаем, Three.js сам подхватит оригинальные цвета из файла
                }
            });
            scene.add(gltf.scene);
            camera.position.set(0, 0, 50);
            
            loaderDiv.style.opacity = '0';
            setTimeout(() => loaderDiv.style.display = 'none', 1500);
        });

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
