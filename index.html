<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Корпус</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Стили для подсказок при наведении на точки */
        .label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -120%);
            z-index: 10;
            border: 1px solid #00ffcc;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="info-label" class="label">Этаж</div>

    <script>
        let scene, camera, renderer, controls;
        let model;
        let clickableObjects = []; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Сцена и черный фон
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 2. Камера
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25); // Немного отодвинул камеру назад, чтобы корпус точно поместился

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 4. Управление камерой
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 5. Освещение (сделал ярче, чтобы проявить рельеф модели)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(10, 20, 15);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            dirLight2.position.set(-10, -10, -15);
            scene.add(dirLight2);

            // 6. Загрузка 3D модели корпуса
            const loader = new THREE.GLTFLoader();
            
            // Проверь, что файл на GitHub называется именно 'model.glb'
            loader.load('model.glb', function (gltf) {
                model = gltf.scene;
                
                // Создаем один стабильный материал для всего корпуса (светло-серый, матовый)
                const defaultMaterial = new THREE.MeshStandardMaterial({
                    color: 0xcccccc,
                    roughness: 0.7,
                    metalness: 0.1,
                    side: THREE.DoubleSide // Чтобы внутренние стенки тоже рендерились
                });

                // Принудительно лечим сетку модели
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = defaultMaterial;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // Автоматически центрируем модель и масштабируем, если она из Блендера выгрузилась микроскопической или огромной
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                scene.add(model);

                // Создаем интерактивные точки для этажей
                // НАСТРОЙКА ВЫСОТЫ: Меняй второе число (Y), чтобы двигать маркеры вверх/вниз по этажам
                createFloorMarker(new THREE.Vector3(0, -2.0, 2), "1 Этаж", "https://example.com/floor1");
                createFloorMarker(new THREE.Vector3(0, 0.0, 2), "2 Этаж", "https://example.com/floor2");
                createFloorMarker(new THREE.Vector3(0, 2.0, 2), "3 Этаж", "https://example.com/floor3");

            }, undefined, function (error) {
                console.error('Ошибка загрузки модели:', error);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        // Функция создания кликабельного маркера для этажа
        function createFloorMarker(position, name, url) {
            const geometry = new THREE.SphereGeometry(0.3, 16, 16); // Сферы стали чуть крупнее (0.3 вместо 0.2)
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            const marker = new THREE.Mesh(geometry, material);
            
            marker.position.copy(position);
            marker.userData = { name: name, url: url }; 
            
            scene.add(marker);
            clickableObjects.push(marker); 
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Логика наведения мыши
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Проверяем пересечение с корпусом
            if (model) {
                const intersectsModel = raycaster.intersectObject(model, true);
                
                model.traverse(function (child) {
                    if (child.isMesh) {
                        // Если мышка наведена на корпус, включаем режим каркаса (wireframe)
                        child.material.wireframe = intersectsModel.length > 0;
                    }
                });
            }

            // Проверяем пересечение с маркерами этажей
            const intersectsMarkers = raycaster.intersectObjects(clickableObjects);
            const label = document.getElementById('info-label');

            if (intersectsMarkers.length > 0) {
                const hitMarker = intersectsMarkers[0].object;
                document.body.style.cursor = 'pointer';
                
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = hitMarker.userData.name;
            } else {
                // Если мышь наведена на сам корпус (в режиме сетки), тоже делаем курсор-указатель
                if (model && raycaster.intersectObject(model, true).length > 0) {
                    document.body.style.cursor = 'crosshair'; // Курсор прицела для стиля, или замени на 'pointer'
                } else {
                    document.body.style.cursor = 'default';
                }
                label.style.display = 'none';
            }
        }

        // Логика клика
        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const clickedMarker = intersects[0].object;
                window.location.href = clickedMarker.userData.url;
            }
        }
    </script>
</body>
</html>
