<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>sintez.space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        #header { position: absolute; top: 40px; left: 40px; color: rgba(255, 255, 255, 0.7); letter-spacing: 0.35em; text-transform: uppercase; font-size: 12px; z-index: 10; pointer-events: none; border-left: 1px solid rgba(255, 255, 255, 0.2); padding-left: 15px; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
</head>
<body>
    <div id="header">sintez.space</div>
    <div id="canvas-container"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Плавность вращения
        controls.dampingFactor = 0.03; 
        
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        let korpus = null;
        let internalObjects = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    if(obj.name.toLowerCase().includes('korpus')) {
                        korpus = obj;
                        obj.material = new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: false, transparent: true});
                    } else {
                        internalObjects.push(obj);
                        obj.visible = false;
                    }
                }
            });
            scene.add(gltf.scene);
            camera.position.set(0, 0, 50);
        });

        // Плавное следование за курсором при приближении
        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) { // Если крутим на приближение
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(korpus);
                if (intersects.length > 0) {
                    // Плавно сдвигаем таргет камеры в точку под курсором
                    controls.target.lerp(intersects[0].point, 0.1);
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            
            if(korpus) {
                const intersects = raycaster.intersectObject(korpus);
                const isHovered = intersects.length > 0;
                
                // Оставляем только чистую сетку при наведении
                korpus.material.wireframe = isHovered;
                korpus.material.opacity = isHovered ? 0.3 : 1.0;
                internalObjects.forEach(obj => obj.visible = isHovered);
            }
        });

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();
    </script>
</body>
</html>
