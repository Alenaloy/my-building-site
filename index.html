<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; background: #050505; overflow: hidden; }</style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
</head>
<body>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let korpus = null;

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            const model = gltf.scene;
            
            // Находим корпус и красим всё
            model.traverse(obj => {
                if(obj.isMesh) {
                    if(obj.name.toLowerCase().includes('korpus')) {
                        korpus = obj;
                        obj.material = new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true});
                    } else {
                        obj.material = new THREE.MeshStandardMaterial({color: 0x00ffcc});
                    }
                }
            });

            // ЦЕНТРУЕМ ВСЮ МОДЕЛЬ СРАЗУ
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            scene.add(model);
            camera.position.set(0, 0, 50);
            controls.update();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            
            if(korpus) {
                const intersects = raycaster.intersectObject(korpus);
                korpus.material.wireframe = (intersects.length > 0);
                korpus.material.opacity = (intersects.length > 0) ? 0.3 : 1.0;
            }
        });

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
