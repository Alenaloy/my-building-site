<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintez Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #eeeeee;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Маленькая аккуратная шапка */
        #header-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
            z-index: 10;
            text-transform: lowercase;
            opacity: 0.8;
        }
        /* Подсказка при наведении */
        .label {
            position: absolute;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -130%);
            z-index: 10;
            border: 1px solid #00ffcc;
        }
        /* Окно просмотра объекта на полный экран */
        #detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            z-index: 200;
        }
        #modal-canvas {
            width: 100%;
            height: 100%;
        }
        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: 0.3s;
        }
        #close-btn:hover {
            background: #ff3333;
            color: #fff;
        }
        #modal-title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 16px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="header-logo">sintez.space</div>
    <div id="canvas-container"></div>
    <div id="info-label" class="label">Объект</div>

    <div id="detail-modal">
        <div id="modal-title">Режим детального осмотра объекта</div>
        <button id="close-btn" onclick="closeModal()">[ ЗАКРЫТЬ ]</button>
        <div id="modal-canvas"></div>
    </div>

    <script>
        // Переменные главной сцены
        let scene, camera, renderer, controls;
        let mainModel, buildingMesh, coolerMesh;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Переменные окна детального просмотра
        let modalScene, modalCamera, modalRenderer, modalControls, clonedObject;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 25); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Настройки вращения на 360 градусов без ограничений
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 50;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 30, 20);
            scene.add(dirLight1);

            const loader = new THREE.GLTFLoader();
            
            loader.load('korpus.glb.glb', function (gltf) {
                mainModel = gltf.scene;
                
                // Разделяем объекты по именам из Blender
                mainModel.traverse(function (child) {
                    if (child.isMesh) {
                        if (child.name.includes('korpus_mesh')) {
                            buildingMesh = child;
                            // Базовый красивый материал для стен
                            buildingMesh.material = new THREE.MeshStandardMaterial({
                                color: 0xcccccc,
                                roughness: 0.5,
                                metalness: 0.1,
                                side: THREE.DoubleSide
                            });
                        }
                        if (child.name.includes('cooler_mesh')) {
                            coolerMesh = child;
                            // Яркий материал для кулера, чтобы выделялся
                            coolerMesh.material = new THREE.MeshStandardMaterial({
                                color: 0x00ffcc,
                                metalness: 0.8,
                                roughness: 0.2
                            });
                        }
                    }
                });

                // Центрируем сцену
                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                
                scene.add(mainModel);
                controls.target.set(0, 0, 0);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update(); 
            if (renderer && scene && camera) renderer.render(scene, camera);
            
            // Анимация вращения объекта в модальном окне
            if (modalControls) modalControls.update();
            if (modalRenderer && modalScene && modalCamera) modalRenderer.render(modalScene, modalCamera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Логика наведения мыши
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const label = document.getElementById('info-label');

            if (!mainModel || !buildingMesh) return;

            // Проверяем наведение на корпус или кулер
            const intersectsBuilding = raycaster.intersectObject(buildingMesh);
            const intersectsCooler = coolerMesh ? raycaster.intersectObject(coolerMesh) : [];

            if (intersectsBuilding.length > 0 || intersectsCooler.length > 0) {
                // Если навели — включаем сетку корпуса
                buildingMesh.material.wireframe = true;
                document.body.style.cursor = 'grab';

                // Если навели конкретно на кулер внутри сетки
                if (intersectsCooler.length > 0) {
                    document.body.style.cursor = 'pointer';
                    label.style.display = 'block';
                    label.style.left = event.clientX + 'px';
                    label.style.top = event.clientY + 'px';
                    label.innerHTML = "Открыть: Нажмите для осмотра детали";
                } else {
                    label.style.display = 'none';
                }
            } else {
                // Убрали мышь — возвращаем монолитный вид здания
                buildingMesh.material.wireframe = false;
                label.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        // Логика клика (открытие на полный экран)
        function onMouseClick() {
            if (!coolerMesh) return;

            raycaster.setFromCamera(mouse, camera);
            const intersectsCooler = raycaster.intersectObject(coolerMesh);

            if (intersectsCooler.length > 0) {
                openModal(coolerMesh);
            }
        }

        // ФУНКЦИЯ ПОЛНОГО ЭКРАНА ДЛЯ ОБЪЕКТА
        function openModal(targetMesh) {
            document.getElementById('detail-modal').style.display = 'block';
            const modalContainer = document.getElementById('modal-canvas');

            // Создаем отдельную сцену для детального просмотра
            modalScene = new THREE.Scene();
            modalScene.background = new THREE.Color(0x050505);

            modalCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            modalCamera.position.set(0, 0, 5);

            modalRenderer = new THREE.WebGLRenderer({ antialias: true });
            modalRenderer.setSize(window.innerWidth, window.innerHeight);
            modalContainer.appendChild(modalRenderer.domElement);

            modalControls = new THREE.OrbitControls(modalCamera, modalRenderer.domElement);
            modalControls.enableDamping = true;

            // Освещение для модального окна
            const light = new THREE.AmbientLight(0xffffff, 0.8);
            modalScene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 5, 5);
            modalScene.add(dirLight);

            // Клонируем объект, чтобы не ломать основную сцену
            clonedObject = targetMesh.clone();
            clonedObject.position.set(0, 0, 0); // Ставим ровно по центру экрана
            clonedObject.scale.set(2, 2, 2);    // Увеличиваем масштаб для удобства
            modalScene.add(clonedObject);
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            const modalContainer = document.getElementById('modal-canvas');
            
            // Полностью очищаем память модального окна
            while(modalContainer.firstChild) {
                modalContainer.removeChild(modalContainer.firstChild);
            }
            modalScene = null;
            modalCamera = null;
            modalRenderer = null;
            modalControls = null;
        }
    </script>
</body>
</html>
