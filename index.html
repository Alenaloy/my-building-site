<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Корпус • Интерактивный вид</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: sans-serif;
            color: #eeeeee;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Всплывающие подсказки при наведении на точки */
        .label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -130%);
            z-index: 10;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            white-space: nowrap;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="info-label" class="label">Этаж</div>

    <script>
        let scene, camera, renderer, controls;
        let model;
        let clickableObjects = []; // Сюда добавляются кружочки
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Сцена и черный фон
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // 2. Камера (смотрит на центр здания)
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 28); 

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding; // Делаем цвета ярче
            container.appendChild(renderer.domElement);

            // 4. Управление камерой (крутить, приближать)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Плавность вращения
            controls.dampingFactor = 0.05;
            controls.minDistance = 10; // Минимальное приближение
            controls.maxDistance = 50; // Максимальное удаление
            controls.target.set(0, -2, 0); // Фокус камеры на здание

            // 5. Освещение (со всех сторон)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 30, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-20, 10, -20);
            scene.add(dirLight2);

            // 6. Загрузка 3D модели
            const loader = new THREE.GLTFLoader();
            
            // Загружаем файл с двойным расширением
            loader.load('korpus.glb.glb', function (gltf) {
                model = gltf.scene;
                
                // Светло-серый, матовый материал, подчеркивающий рельеф
                const defaultMaterial = new THREE.MeshStandardMaterial({
                    color: 0xcccccc,
                    roughness: 0.6,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                // Применяем материал ко всему зданию
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = defaultMaterial;
                        // Нам нужно запомнить, что этот материал - матовый, чтобы потом его восстанавливать
                        child.userData.isOriginalMaterial = true;
                    }
                });
                
                // Автоматически центрируем модель корпуса по осям
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                scene.add(model);

                // Расставляем интерактивные точки по этажам твоего здания
                // НАСТРОЙКА ВЫСОТЫ: Меняй второе число (Y), чтобы точки встали идеально под окна
                createFloorMarker(new THREE.Vector3(0, -3.2, 3), "1 Этаж • Вход • Аренда", "https://example.com/floor1");
                createFloorMarker(new THREE.Vector3(0, -1.0, 3), "2 Этаж • Планировка", "https://example.com/floor2");
                createFloorMarker(new THREE.Vector3(0, 1.2, 3), "3 Этаж • Свободный", "https://example.com/floor3");
                createFloorMarker(new THREE.Vector3(0, 3.4, 3), "4 Этаж • Пентхаус", "https://example.com/floor4");

            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        // Функция для создания светящихся бирюзовых сфер на этажах
        function createFloorMarker(position, name, url) {
            const geometry = new THREE.SphereGeometry(0.35, 16, 16); 
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.9 });
            const marker = new THREE.Mesh(geometry, material);
            
            marker.position.copy(position);
            marker.userData = { name: name, url: url }; // Сохраняем данные
            
            scene.add(marker);
            clickableObjects.push(marker); // Добавляем в список для кликов
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update(); // Плавное вращение камеры
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Логика наведения мыши (на точки и на корпус)
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersectsMarkers = raycaster.intersectObjects(clickableObjects);
            const label = document.getElementById('info-label');

            if (intersectsMarkers.length > 0) {
                // МЫШЬ НАВЕДЕНА НА ТОЧКУ ЭТАЖА
                const hitMarker = intersectsMarkers[0].object;
                document.body.style.cursor = 'pointer';
                
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = hitMarker.userData.name;

                // МАГИЯ: Заставляем корпус растворяться при наведении на этаж
                if (model) {
                    model.traverse(function (child) {
                        if (child.isMesh && child.userData.isOriginalMaterial) {
                            child.material.wireframe = true; // Превращаем в сетку
                        }
                    });
                }
            } else {
                // МЫШЬ НЕ НАВЕДЕНА НА ТОЧКУ
                label.style.display = 'none';

                // Возвращаем корпусу обычный вид, если мышь наведена на сам корпус
                if (model) {
                    model.traverse(function (child) {
                        if (child.isMesh && child.userData.isOriginalMaterial) {
                            child.material.wireframe = false; // Возвращаем обычный вид
                        }
                    });
                    
                    if (raycaster.intersectObject(model, true).length > 0) {
                        document.body.style.cursor = 'grab'; // Курсор прицела для стиля
                    } else {
                        document.body.style.cursor = 'default';
                    }
                }
            }
        }

        // Логика клика
        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const clickedMarker = intersects[0].object;
                // Направляем пользователя на ссылку
                window.location.href = clickedMarker.userData.url;
            }
        }
    </script>
</body>
</html>
