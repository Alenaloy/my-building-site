<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sintez Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 1s; }
        .text { color: #fff; letter-spacing: 0.5em; text-transform: uppercase; font-size: 20px; font-weight: 100; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        #header { position: absolute; top: 40px; left: 40px; color: #fff; letter-spacing: 0.4em; text-transform: uppercase; font-size: 14px; font-weight: 100; z-index: 10; pointer-events: none; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader"><div class="text">Sintez.space</div></div>
    <div id="header">Sintez.space</div>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.02; // Очень плавно
        
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    // Всегда в сетке, без заливки
                    obj.material = new THREE.MeshBasicMaterial({
                        color: 0xffffff, 
                        wireframe: true, 
                        transparent: true, 
                        opacity: 0.5 
                    });
                }
            });
            scene.add(gltf.scene);
            camera.position.set(0, 0, 50);
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        });

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
