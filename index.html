<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sintez Space</title>
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Управление (кручение)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Освещение
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    // ПРИНУДИТЕЛЬНО БЕЛЫЙ МАТЕРИАЛ ДЛЯ ВСЕХ
                    obj.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.5,
                        metalness: 0.1
                    });
                    obj.position.set(0, 0, 0); // Центруем каждый объект
                }
            });
            scene.add(gltf.scene);
            camera.position.set(20, 20, 20);
            controls.update();
        });

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); // ЭТО ВКЛЮЧАЕТ КРУЧЕНИЕ
            renderer.render(scene, camera); 
        }
        animate();
    </script>
</body>
</html>
