<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sintez.Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300&display=swap');
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* Прелоудер */
        #loader { position: fixed; inset: 0; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 1s; }
        .text { color: #fff; letter-spacing: 0.5em; text-transform: uppercase; font-size: 18px; font-weight: 100; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        #header { position: absolute; top: 40px; left: 40px; color: #fff; letter-spacing: 0.4em; text-transform: uppercase; font-size: 12px; font-weight: 100; z-index: 10; pointer-events: none; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="loader"><div class="text">Sintez.Space</div></div>
    <div id="header">Sintez.Space</div>
    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.03; 

        // ИЗМЕНЕНИЕ 1: Глобальный материал сетки для ВСЕХ объектов
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff, // Мятно-голубой цвет сетки (можно поменять на 0xffffff для белой)
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);
        
        loader.load('scan2.glb', (gltf) => {
            // ИЗМЕНЕНИЕ 2: Применяем материал сетки ко всему, что есть в модели
            gltf.scene.traverse(obj => {
                if(obj.isMesh) {
                    obj.material = wireframeMaterial;
                }
            });
            
            scene.add(gltf.scene);
            camera.position.set(0, 0, 50);
            
            // Убираем прелоудер
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
        });

        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
        animate();
    </script>
</body>
</html>
