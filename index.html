<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Корпус • Свободный обзор</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
            font-family: sans-serif;
            color: #eeeeee;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Всплывающие подсказки */
        .label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -130%);
            z-index: 10;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            white-space: nowrap;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="info-label" class="label">Этаж</div>

    <script>
        let scene, camera, renderer, controls;
        let model;
        let clickableObjects = []; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 28); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding; 
            container.appendChild(renderer.domElement);

            // НАСТРОЙКА УПРАВЛЕНИЯ НА 360 ГРАДУСОВ
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            
            // Снимаем любые ограничения на вращение!
            controls.minAzimuthAngle = -Infinity; // Крути вокруг оси сколько угодно
            controls.maxAzimuthAngle = Infinity;
            controls.minPolarAngle = 0;           // Позволяет смотреть строго сверху
            controls.maxPolarAngle = Math.PI;     // Позволяет смотреть строго снизу (полная сфера)
            
            // Настройки приближения
            controls.minDistance = 5; 
            controls.maxDistance = 60; 
            controls.enablePan = true; // Разрешаем перетаскивать модель вбок правой кнопкой мыши

            // Освещение со всех сторон
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(20, 30, 20);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-20, 10, -20);
            scene.add(dirLight2);

            const loader = new THREE.GLTFLoader();
            
            // Загрузка файла с двойным расширением
            loader.load('korpus.glb.glb', function (gltf) {
                model = gltf.scene;
                
                const defaultMaterial = new THREE.MeshStandardMaterial({
                    color: 0xcccccc,
                    roughness: 0.6,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material = defaultMaterial;
                        child.userData.isOriginalMaterial = true;
                    }
                });
                
                // Центрирование
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                scene.add(model);

                // Корректируем фокус камеры точно в центр отцентрованной модели
                controls.target.set(0, 0, 0);

                // Интерактивные точки
                createFloorMarker(new THREE.Vector3(0, -3.2, 3), "1 Этаж • Вход • Аренда", "https://example.com/floor1");
                createFloorMarker(new THREE.Vector3(0, -1.0, 3), "2 Этаж • Планировка", "https://example.com/floor2");
                createFloorMarker(new THREE.Vector3(0, 1.2, 3), "3 Этаж • Свободный", "https://example.com/floor3");
                createFloorMarker(new THREE.Vector3(0, 3.4, 3), "4 Этаж • Пентхаус", "https://example.com/floor4");
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function createFloorMarker(position, name, url) {
            const geometry = new THREE.SphereGeometry(0.35, 16, 16); 
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.9 });
            const marker = new THREE.Mesh(geometry, material);
            
            marker.position.copy(position);
            marker.userData = { name: name, url: url }; 
            
            scene.add(marker);
            clickableObjects.push(marker); 
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update(); 
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersectsMarkers = raycaster.intersectObjects(clickableObjects);
            const label = document.getElementById('info-label');

            if (intersectsMarkers.length > 0) {
                const hitMarker = intersectsMarkers[0].object;
                document.body.style.cursor = 'pointer';
                
                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = hitMarker.userData.name;

                if (model) {
                    model.traverse(function (child) {
                        if (child.isMesh && child.userData.isOriginalMaterial) {
                            child.material.wireframe = true; 
                        }
                    });
                }
            } else {
                label.style.display = 'none';

                if (model) {
                    model.traverse(function (child) {
                        if (child.isMesh && child.userData.isOriginalMaterial) {
                            child.material.wireframe = false; 
                        }
                    });
                    
                    if (raycaster.intersectObject(model, true).length > 0) {
                        document.body.style.cursor = 'grab'; 
                    } else {
                        document.body.style.cursor = 'default';
                    }
                }
            }
        }

        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const clickedMarker = intersects[0].object;
                window.location.href = clickedMarker.userData.url;
            }
        }
    </script>
</body>
</html>
