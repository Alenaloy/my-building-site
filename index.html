<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintez Space</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Логотип sintez.space */
        #header-logo {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 10;
            text-transform: lowercase;
        }
        /* Всплывающая подсказка для сканов */
        .label {
            position: absolute;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -130%);
            z-index: 100;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        /* Окно осмотра объекта на полный экран */
        #detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 5, 0.98);
            display: none;
            z-index: 200;
        }
        #modal-canvas {
            width: 100%;
            height: 100%;
        }
        #close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: 1px solid rgba(255, 51, 51, 0.5);
            color: #ff3333;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: 0.2s;
        }
        #close-btn:hover {
            background: #ff3333;
            color: #fff;
            border-color: #ff3333;
        }
        #modal-title {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #00ffcc;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="header-logo">sintez.space</div>
    <div id="info-label" class="label">Объект</div>
    <div id="canvas-container"></div>

    <div id="detail-modal">
        <div id="modal-title">Детальный анализ отсканированного объекта</div>
        <button id="close-btn" onclick="closeModal()">ЗАКРЫТЬ</button>
        <div id="modal-canvas"></div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let mainModel;
        let buildingMeshes = []; // Массив для частей самого здания
        let scanObjects = [];    // Массив для внутренних сканов
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let modalScene, modalCamera, modalRenderer, modalControls, clonedObject;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(30, 20, 40); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Полное вращение на 360 градусов без залипаний
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 150;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(40, 50, 30);
            scene.add(dirLight1);

            const loader = new THREE.GLTFLoader();
            
            // Загружаем твой новый файл scan1.glb
            loader.load('scan1.glb', function (gltf) {
                mainModel = gltf.scene;
                
                // Сначала определим самый большой объект — это будет корпус
                let meshes = [];
                mainModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.geometry.computeBoundingBox();
                        const size = child.geometry.boundingBox.getSize(new THREE.Vector3());
                        const volume = size.x * size.y * size.z;
                        meshes.push({ mesh: child, volume: volume });
                    }
                });

                // Сортируем объекты по размеру
                meshes.sort((a, b) => b.volume - a.volume);

                // Самый большой объект (или первые два, если здание разделено) — это стены корпуса
                const thresholdVolume = meshes[0].volume * 0.1; // Всё, что больше 10% от главного меша — здание

                meshes.forEach(item => {
                    let child = item.mesh;
                    if (item.volume >= thresholdVolume) {
                        // Это корпус
                        buildingMeshes.push(child);
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0x666666,
                            roughness: 0.6,
                            metalness: 0.1,
                            side: THREE.DoubleSide
                        });
                    } else {
                        // Это отсканированные внутренние объекты
                        scanObjects.push(child);
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0x00ffcc, // Наш неоновый бирюзовый цвет для сканов
                            roughness: 0.3,
                            metalness: 0.5
                        });
                        child.userData.originalColor = child.material.color.getHex();
                    }
                });

                // Центрируем всю твою сцену на экране
                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                
                scene.add(mainModel);
                controls.target.set(0, 0, 0);
            });

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onMouseClick);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update(); 
            if (renderer && scene && camera) renderer.render(scene, camera);
            
            if (modalControls) modalControls.update();
            if (modalRenderer && modalScene && modalCamera) modalRenderer.render(modalScene, modalCamera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Логика наведения мыши (Включение сетки корпуса + Подсветка деталей)
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const label = document.getElementById('info-label');

            if (!mainModel || buildingMeshes.length === 0) return;

            // Проверяем наведение на стены здания
            const intersectsBuilding = raycaster.intersectObjects(buildingMeshes);

            if (intersectsBuilding.length > 0) {
                // Навели на здание -> превращаем стены в СЕТКУ (Wireframe)
                buildingMeshes.forEach(mesh => {
                    mesh.material.wireframe = true;
                    mesh.material.transparent = true;
                    mesh.material.opacity = 0.15; // Делаем прозрачной, чтобы видеть сквозь неё
                });
            } else {
                // Мышь ушла -> возвращаем зданию плотный вид
                buildingMeshes.forEach(mesh => {
                    mesh.material.wireframe = false;
                    mesh.material.transparent = false;
                    mesh.material.opacity = 1.0;
                });
            }

            // Проверяем наведение на внутренние сканы
            const intersectsScans = raycaster.intersectObjects(scanObjects);

            // Сбрасываем подсветку сканов
            scanObjects.forEach(obj => {
                obj.material.color.setHex(obj.userData.originalColor);
            });

            if (intersectsScans.length > 0) {
                // Мышь наведена на внутренний скан! Подсвечиваем белым
                const hoveredScan = intersectsScans[0].object;
                hoveredScan.material.color.setHex(0xffffff); 
                document.body.style.cursor = 'pointer';

                label.style.display = 'block';
                label.style.left = event.clientX + 'px';
                label.style.top = event.clientY + 'px';
                label.innerHTML = `Компонент: ${hoveredScan.name || "Скан"} (Клик для детекции)`;
            } else {
                label.style.display = 'none';
                if (intersectsBuilding.length > 0) {
                    document.body.style.cursor = 'grab';
                } else {
                    document.body.style.cursor = 'default';
                }
            }
        }

        // Клик для открытия на полный экран
        function onMouseClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersectsScans = raycaster.intersectObjects(scanObjects);

            if (intersectsScans.length > 0) {
                openModal(intersectsScans[0].object);
            }
        }

        // МОДАЛЬНОЕ ОКНО ДЛЯ ИЗУЧЕНИЯ ДЕТАЛИ
        function openModal(targetMesh) {
            document.getElementById('detail-modal').style.display = 'block';
            const modalContainer = document.getElementById('modal-canvas');

            modalScene = new THREE.Scene();
            modalScene.background = new THREE.Color(0x020202);

            modalCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            modalCamera.position.set(0, 0, 4);

            modalRenderer = new THREE.WebGLRenderer({ antialias: true });
            modalRenderer.setSize(window.innerWidth, window.innerHeight);
            modalRenderer.outputEncoding = THREE.sRGBEncoding;
            modalContainer.appendChild(modalRenderer.domElement);

            modalControls = new THREE.OrbitControls(modalCamera, modalRenderer.domElement);
            modalControls.enableDamping = true;

            const light = new THREE.AmbientLight(0xffffff, 0.7);
            modalScene.add(light);
            const dirLight = new THREE.DirectionalLight(0x00ffcc, 1);
            dirLight.position.set(5, 5, 5);
            modalScene.add(dirLight);

            clonedObject = targetMesh.clone();
            clonedObject.position.set(0, 0, 0);
            
            clonedObject.material = targetMesh.material.clone();
            clonedObject.material.color.setHex(targetMesh.userData.originalColor);

            // Авто-размер клона под экран модалки
            const box = new THREE.Box3().setFromObject(clonedObject);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            clonedObject.scale.setScalar(1.8 / maxDim);

            modalScene.add(clonedObject);
        }

        function closeModal() {
            document.getElementById('detail-modal').style.display = 'none';
            const modalContainer = document.getElementById('modal-canvas');
            while(modalContainer.firstChild) {
                modalContainer.removeChild(modalContainer.firstChild);
            }
            modalScene = null; modalCamera = null; modalRenderer = null; modalControls = null;
        }
    </script>
</body>
</html>
